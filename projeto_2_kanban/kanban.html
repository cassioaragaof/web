<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadro Scrum - Sprint Atual</title>
    <link rel="stylesheet" href="kanban.css">
</head>
<body>

    <div class="kanban-wrapper">
        <header class="scrum-header">
            <div class="sprint-info">
                <h1>Tarefas e Projetos</h1>
                <p class="sprint-goal">🎯 <strong>Meta:</strong> Autenticação e Painel.</p>
            </div>
            <a href="dashboard.html" class="btn-back">⬅ Voltar ao Painel</a>
        </header>

        <div class="add-task-container">
            <h3 class="add-task-title">✨ Criar Nova Tarefa</h3>
            <section class="add-task-form">
                <input type="text" id="taskTitle" placeholder="Título da tarefa...">
                <input type="date" id="taskDate">
                <button onclick="addNewTask()">Adicionar Tarefa</button>
            </section>
        </div>

        <div class="scrum-board">
            <div class="scrum-column" id="col-todo">
                <h2 class="column-title">Sprint Backlog <span>0</span></h2>
            </div>
            <div class="scrum-column" id="col-in-progress">
                <h2 class="column-title">Em Desenvolvimento <span>0</span></h2>
            </div>
            <div class="scrum-column" id="col-review">
                <h2 class="column-title">Revisão / QA <span>0</span></h2>
            </div>
            <div class="scrum-column" id="col-done">
                <h2 class="column-title">Concluído <span>0</span></h2>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
