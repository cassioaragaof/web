<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil</title>
    <link rel="stylesheet" href="editar-perfil.css">
</head>
<body>

    <div class="edit-profile-wrapper">
        <div class="edit-card">
            <h2>✏️ Editar Perfil</h2>
            
            <div class="input-group">
                <label>Avatar (Emoji ou URL da imagem):</label>
                <input type="text" id="editAvatar" placeholder="Ex: 👨‍💻 ou https://link.com/foto.jpg">
            </div>
            
            <div class="input-group">
                <label>Nome Completo:</label>
                <input type="text" id="editName">
            </div>
            
            <div class="input-group">
                <label>Cargo / Descrição:</label>
                <input type="text" id="editRole">
            </div>
            
            <div class="input-group">
                <label>E-mail:</label>
                <input type="email" id="editEmail">
            </div>
            
            <div class="input-group">
                <label>Setor:</label>
                <input type="text" id="editSector">
            </div>
            
            <div class="actions">
                <a href="dashboard.html" class="btn-cancel">Cancelar</a>
                <button class="btn-save" onclick="saveProfileFromPage()">💾 Salvar e Voltar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
